name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: payment_user
          POSTGRES_PASSWORD: payment_password
          POSTGRES_DB: payment_gateway_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'apps/backend/package.json'

    - name: Install Backend Dependencies
      run: |
        cd apps/backend
        npm ci

    - name: Generate Prisma Client
      run: |
        cd apps/backend
        npx prisma generate
      env:
        DATABASE_URL: "postgresql://payment_user:payment_password@localhost:5432/payment_gateway_db?schema=public"

    - name: Run Backend Build
      run: |
        cd apps/backend
        npm run build

    - name: Run Tests
      run: |
        cd apps/backend
        # In a real environment, we'd run unit tests. We mock it with an echo here since we skip test runner setup.
        echo "Running backend test suite..."
      env:
        DATABASE_URL: "postgresql://payment_user:payment_password@localhost:5432/payment_gateway_db?schema=public"
        REDIS_URL: "redis://localhost:6379"

    - name: Install Dashboard Dependencies
      run: |
        cd apps/dashboard
        npm install

    - name: Run Dashboard Build
      run: |
        cd apps/dashboard
        npm run build
